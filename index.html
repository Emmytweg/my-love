<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;800&display=swap');

        body {
            background-color: #0f0104;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        .heart-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        .word {
            position: absolute;
            color: #ff3e6c;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            text-shadow: 0 0 15px rgba(255, 62, 108, 0.4);
            transition: all 0.5s ease;
            cursor: pointer;
        }

        .word:hover {
            color: #ffffff;
            text-shadow: 0 0 25px #ff3e6c;
            transform: scale(1.2) !important;
            z-index: 100;
        }

        .center-text {
            position: absolute;
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: white;
            text-align: center;
            z-index: 50;
            text-shadow: 0 0 20px #ff3e6c;
            pointer-events: none;
        }

        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 62, 108, 0.2) 0%, rgba(15, 1, 4, 0) 70%);
            border-radius: 50%;
            z-index: -1;
        }

        #tap-msg {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    
    <div class="heart-container" id="heart">
        <div class="center-text">My Love</div>
    </div>

    <div id="tap-msg">Tap the heart</div>

    <script>
        const heartContainer = document.getElementById('heart');
        const words = ["HAPPY", "BIRTHDAY", "YOU", "ARE", "MY", "EVERYTHING", "FOREVER", "ALWAYS", "KISSES", "HUGS", "SWEETHEART", "MINE"];
        
        // Heart formula to plot points
        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * scale, y: y * scale };
        }

        // Create the outline of the heart with the main birthday words
        function createHeart() {
            const totalWords = 40;
            
            for (let i = 0; i < totalWords; i++) {
                const t = (i / totalWords) * Math.PI * 2;
                // Outer ring
                const pos = getHeartPoint(t, 12);
                addWord(pos.x, pos.y, words[i % words.length], t);
                
                // Middle ring (smaller scale)
                if (i % 2 === 0) {
                    const pos2 = getHeartPoint(t, 8);
                    addWord(pos2.x, pos2.y, words[(i + 3) % words.length], t, 0.7);
                }
            }
        }

        function addWord(x, y, text, angle, opacity = 1) {
            const el = document.createElement('div');
            el.className = 'word';
            el.innerText = text;
            
            // Randomize font size slightly
            const fontSize = Math.random() * (16 - 10) + 10;
            
            el.style.left = `calc(50% + ${x}px)`;
            el.style.top = `calc(50% + ${y}px)`;
            el.style.fontSize = `${fontSize * opacity}px`;
            el.style.opacity = opacity;
            
            // Rotate word to align with heart curve
            const rotation = angle * (180 / Math.PI);
            el.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            
            heartContainer.appendChild(el);
        }

        // Add a burst effect when clicking
        heartContainer.addEventListener('click', (e) => {
            const burstCount = 10;
            for (let i = 0; i < burstCount; i++) {
                const spark = document.createElement('div');
                spark.style.position = 'absolute';
                spark.style.left = e.clientX + 'px';
                spark.style.top = e.clientY + 'px';
                spark.style.width = '5px';
                spark.style.height = '5px';
                spark.style.backgroundColor = '#ff3e6c';
                spark.style.borderRadius = '50%';
                spark.style.pointerEvents = 'none';
                document.body.appendChild(spark);

                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 100;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                spark.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1000,
                    easing: 'ease-out'
                }).onfinish = () => spark.remove();
            }
        });

        createHeart();
    </script>
</body>
</html>
